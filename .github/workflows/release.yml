name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get id from module.prop
        shell: bash
        run: |
          ID=$(jq '.name' info.json)
          echo "ID=$ID" >> $GITHUB_ENV

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: List files in the repository
        run: ls -R

      - name: Zip module
        shell: bash
        run: |
          DIR_NAME="${{ env.ID }}_${{ env.VERSION }}"
          ZIP_NAME="${{ env.ID }}_${{ env.VERSION }}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          mkdir -p ../temp_build/$DIR_NAME
          cp -r * ../temp_build/$DIR_NAME/
          cd ../temp_build
          zip -r $GITHUB_WORKSPACE/$ZIP_NAME $DIR_NAME

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
